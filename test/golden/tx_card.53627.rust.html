<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Card | 0x11111111...111111</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .card {
            width: 600px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #f59e0b);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo svg {
            width: 40px;
            height: 40px;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .status-pending {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        .tx-type {
            text-align: center;
            margin-bottom: 24px;
        }
        .tx-type-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .tx-value {
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tx-value-usd {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
        }
        .address-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin: 32px 0;
            padding: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }
        .address-box {
            flex: 1;
            text-align: center;
        }
        .address-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .address-hash {
            font-size: 14px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            color: #00d4ff;
            word-break: break-all;
        }
        .address-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .arrow-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .arrow-icon svg {
            width: 24px;
            height: 24px;
            color: #fff;
        }
        .tx-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
        }
        .detail-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }
        .detail-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tx-hash {
            font-size: 12px;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            color: rgba(255, 255, 255, 0.4);
        }
        .timestamp {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #00d4ff);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card" id="tx-card">
            <div class="card-header">
                <div class="logo">
                    <svg viewBox="0 0 36 36" fill="none">
                        <path d="M18 2L4 10v16l14 8 14-8V10L18 2z" fill="#7c3aed"/>
                        <path d="M18 6L8 12v12l10 6 10-6V12L18 6z" fill="white"/>
                        <path d="M18 10L12 14v8l6 4 6-4v-8l-6-4z" fill="#7c3aed"/>
                    </svg>
                    <span class="logo-text">Blockscout</span>
                </div>
                
                        <div class="status-badge status-pending">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            Pending
                        </div>
                    
            </div>
            
            <div class="tx-type">
                <div class="tx-type-label">Transaction</div>
                <div class="tx-value">0 ETH</div>
                
                <div class="tx-value-usd">~$0.00</div>
                
            </div>
            
            <div class="address-flow">
                <div class="address-box">
                    <div class="address-label">From</div>
                    
                    
                    <div class="address-hash">0xdfb6...cedc</div>
                </div>
                
                <div class="arrow-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </div>
                
                <div class="address-box">
                    <div class="address-label">To</div>
                    
                        
                        
                        <div class="address-hash">0x0064...d926</div>
                    
                </div>
            </div>
            
            <div class="tx-details">
                
                <div class="detail-item">
                    <div class="detail-label">Block</div>
                    <div class="detail-value">Pending</div>
                </div>
                
                
                <div class="detail-item">
                    <div class="detail-label">Fee</div>
                    <div class="detail-value">0 ETH</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">Gas Used</div>
                    <div class="detail-value">21.0K</div>
                </div>
            </div>
            
            <div class="card-footer">
                <div class="tx-hash">0x11111111...111111</div>
                <div class="timestamp">--</div>
            </div>
        </div>
        
        <div class="actions">
            <a href="/tx/0x1111111111111111111111111111111111111111111111111111111111111111" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                View Full Details
            </a>
            <button class="btn btn-secondary" onclick="shareCard()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                Share
            </button>
            <button class="btn btn-secondary" onclick="copyLink()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                Copy Link
            </button>
        </div>
    </div>
    
    <script>
        function shareCard() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: 'Transaction 0x11111111...111111',
                    text: '0 ETH transaction on Blockscout',
                    url: url
                });
            } else {
                copyLink();
            }
        }
        
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(function() {
                alert('Link copied to clipboard!');
            });
        }
    </script>
</body>
</html>
